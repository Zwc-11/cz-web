<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Caesar Zhou — Applied AI, Data Science, and Full-Stack Systems" />
    <meta name="theme-color" content="#050505" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Open Graph / social preview -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Caesar Zhou — Applied AI Engineer" />
    <meta property="og:description" content="I build AI systems that meet the real world: agentic platforms, data products, and full-stack systems that turn messy workflows into reliable software." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Caesar Zhou — Applied AI Engineer" />
    <meta name="twitter:description" content="Agentic AI platforms, data products, and full-stack systems built for reliability." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!--
      Fonts are loaded NON-render-blocking via media="print" + onload swap.
      A render-blocking <link rel="stylesheet"> to a third-party CDN also blocks
      the module script, so on networks that block Google Fonts / jsdelivr the
      whole app would never mount. With this pattern the app always renders
      (system-font fallback) and Geist swaps in if/when the CDN is reachable.
    -->
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.min.css"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
      <link href="https://cdn.jsdelivr.net/npm/geist@1.3.1/dist/fonts/geist-sans/style.min.css" rel="stylesheet" />
    </noscript>
    <title>Caesar Zhou</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
